<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JNFAM Leave Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6fa;--white:#fff;--border:#e2e6ef;
  --accent:#2563eb;--accent-l:#eff4ff;
  --green:#16a34a;--green-l:#f0fdf4;
  --red:#dc2626;--red-l:#fef2f2;
  --orange:#ea580c;--orange-l:#fff7ed;
  --yellow:#d97706;--yellow-l:#fffbeb;
  --text:#1e2533;--text2:#5a6478;--text3:#9aa3b5;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 4px 12px rgba(0,0,0,.10),0 8px 28px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.logo span{color:var(--text3);font-weight:400;}
.header-right{display:flex;align-items:center;gap:10px;}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;}
.badge-user{background:var(--accent);}
.badge-admin{background:var(--orange);}
.lang-toggle{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;}
.lang-btn{padding:4px 11px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:'IBM Plex Mono',monospace;}
.lang-btn.active{background:var(--accent);color:#fff;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:#1d4ed8;}
.btn-s{background:var(--green);color:#fff;}.btn-s:hover{background:#15803d;}
.btn-d{background:var(--red);color:#fff;}.btn-d:hover{background:#b91c1c;}
.btn-o{background:var(--white);color:var(--text2);border:1.5px solid var(--border);}.btn-o:hover{background:var(--bg);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-logout{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-logout:hover{background:var(--bg);}
.container{max-width:1200px;margin:0 auto;padding:28px 24px;}
.cal-wrap{background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;}
.cal-top{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-top-left{display:flex;align-items:center;gap:16px;}
.cal-title{font-size:18px;font-weight:900;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cal-nav button:hover{background:var(--bg);}
.cal-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text2);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.cal-body{padding:20px 24px;}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.cdh{text-align:center;font-size:12px;font-weight:700;color:var(--text3);padding:8px 0;}
.cd{min-height:90px;border-radius:10px;padding:8px 10px;border:1px solid var(--border);background:var(--white);}
.cd.today{border-color:var(--accent);background:var(--accent-l);}
.cd.holiday{background:#fef2f2;border-color:#fca5a5;}
.cd.om{opacity:.35;background:var(--bg);}
.cd .dn{font-weight:700;font-size:14px;margin-bottom:4px;}
.cd.today .dn{color:var(--accent);}
.cd.holiday .dn{color:var(--red);}
.cd .hname{font-size:9px;color:var(--red);margin-bottom:4px;font-weight:600;}
.ctag{font-size:10px;padding:3px 7px;border-radius:5px;margin-top:3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.emp-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--white);border:1px solid var(--border);font-size:12px;box-shadow:var(--shadow);}
.emp-chip-dot{width:8px;height:8px;border-radius:50%;}
.emp-chip-name{font-weight:700;color:var(--text);}
.emp-chip-days{color:var(--text3);}
.today-banner{background:linear-gradient(135deg,#2563eb,#1e40af);border-radius:12px;padding:16px 22px;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:14px;}
.today-banner-icon{font-size:24px;}
.today-banner-text strong{font-size:15px;display:block;margin-bottom:3px;}
.today-banner-text span{font-size:13px;opacity:.85;}
#login-modal{display:none;position:fixed;inset:0;background:rgba(30,37,51,.5);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
#login-modal.open{display:flex;}
.login-card{background:var(--white);border-radius:16px;padding:36px;width:100%;max-width:440px;margin:24px;box-shadow:var(--shadow-lg);position:relative;}
.login-card h2{font-size:20px;font-weight:900;margin-bottom:4px;}
.login-card .sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.emp-btn{padding:14px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;text-align:center;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.emp-btn:hover{border-color:var(--accent);background:var(--accent-l);}
.emp-btn .en{font-size:14px;font-weight:700;color:var(--text);}
.emp-btn .er{font-size:11px;color:var(--text3);margin-top:3px;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.admin-row{display:flex;gap:8px;}
.admin-row input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.admin-row input:focus{border-color:var(--accent);}
.modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
#my-panel{display:none;}
.tabs{display:flex;gap:4px;background:var(--white);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;}
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd h3{font-size:14px;font-weight:700;}
.card-bd{padding:20px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--white);border-radius:10px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat .lbl{font-size:10px;color:var(--text3);font-weight:700;margin-bottom:6px;text-transform:uppercase;}
.stat .val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;}
.st-b{border-top:3px solid var(--accent);}
.st-g{border-top:3px solid var(--green);}
.st-o{border-top:3px solid var(--orange);}
.st-r{border-top:3px solid var(--red);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{grid-column:1/-1;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;background:var(--white);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:64px;}
.fa{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.days-preview{background:var(--accent-l);border:1px solid #bfdbfe;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--accent);font-weight:700;}
.llist{display:flex;flex-direction:column;gap:8px;}
.litem{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.li-left{flex:1;min-width:0;}
.li-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.li-meta{font-size:11px;color:var(--text2);}
.li-act{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.sbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.s대기,.sPending{background:var(--yellow-l);color:var(--yellow);}
.s승인,.sApproved{background:var(--green-l);color:var(--green);}
.s반려,.sRejected{background:var(--red-l);color:var(--red);}
.s취소,.sCanceled{background:var(--bg);color:var(--text3);border:1px solid var(--border);}
.etable{width:100%;border-collapse:collapse;font-size:13px;}
.etable th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);}
.etable td{padding:10px 12px;border-bottom:1px solid var(--border);}
.etable tr:last-child td{border-bottom:none;}
.pbar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:3px;}
.pfill{height:100%;border-radius:3px;}
.empty{text-align:center;padding:40px;color:var(--text3);}
.empty-icon{font-size:32px;margin-bottom:8px;}
#modal-wrap{display:none;position:fixed;inset:0;background:rgba(30,37,51,.5);z-index:3000;align-items:center;justify-content:center;}
#modal-wrap.open{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:26px;width:100%;max-width:440px;margin:24px;box-shadow:0 8px 40px rgba(0,0,0,.14);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:14px;}
.modal-act{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;transform:translateY(80px);opacity:0;transition:all .25s;z-index:9999;}
#toast.show{transform:translateY(0);opacity:1;}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr;}.fgrid{grid-template-columns:1fr;}header{padding:0 16px;}.container{padding:16px;}.emp-grid{grid-template-columns:1fr;}.cal-body{padding:12px;}.cgrid{gap:4px;}.cd{min-height:60px;padding:5px;}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>JNFAM<span>/leave</span></div>
  <div class="header-right">
    <div id="header-user" style="display:none" class="user-info">
      <span id="hd-name"></span>
      <span id="hd-badge"></span>
      <button class="btn-logout" id="btn-logout" onclick="logout()">로그아웃</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="btn btn-p" id="btn-login-open" onclick="openLoginModal()" style="font-size:13px;padding:7px 16px">🔐 로그인</button>
  </div>
</header>

<div class="container">
  <div id="today-banner" style="display:none" class="today-banner">
    <div class="today-banner-icon">🏖️</div>
    <div class="today-banner-text">
      <strong id="today-title"></strong>
      <span id="today-sub"></span>
    </div>
  </div>
  <div class="emp-status-bar" id="emp-status-bar"></div>
  <div class="cal-wrap">
    <div class="cal-top">
      <div class="cal-top-left">
        <div class="cal-nav">
          <button onclick="chMonth(-1)">◀</button>
          <button onclick="chMonth(1)">▶</button>
        </div>
        <div class="cal-title" id="cal-title"></div>
      </div>
      <div class="cal-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#fef2f2;border:1px solid #fca5a5"></div>
          <span id="legend-holiday">🇺🇸 미국 연방 공휴일</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--accent-l);border:1px solid var(--accent)"></div>
          <span id="legend-today">오늘</span>
        </div>
      </div>
    </div>
    <div class="cal-body">
      <div class="cgrid" id="cgrid">
        <div style="grid-column:1/-1;text-align:center;padding:40px">
          <div class="spinner"></div>
          <div id="loading-text" style="font-size:13px;color:var(--text3)">데이터 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>
  <div id="my-panel">
    <div class="tabs" id="tabs"></div>
    <div id="tab-content"></div>
  </div>
</div>

<div id="login-modal">
  <div class="login-card">
    <button class="modal-close" onclick="closeLoginModal()">✕</button>
    <h2 id="login-title">로그인</h2>
    <p class="sub" id="login-sub">이름을 선택하면 바로 입장해요</p>
    <div class="emp-grid" id="emp-grid">
      <div style="grid-column:1/-1;text-align:center;padding:20px"><div class="spinner"></div></div>
    </div>
    <div class="divider" id="login-divider">관리자 로그인</div>
    <div class="admin-row">
      <input type="password" id="admin-pw" onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="btn btn-o" id="btn-admin-enter" onclick="adminLogin()">입장</button>
    </div>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<div id="modal-wrap">
  <div class="modal">
    <h3 id="process-title">휴가 처리</h3>
    <div style="background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;" id="modal-info"></div>
    <input type="hidden" id="modal-id">
    <div class="fg">
      <label id="modal-memo-label">처리 메모 (선택)</label>
      <textarea id="modal-note"></textarea>
    </div>
    <div class="modal-act">
      <button class="btn btn-o" id="btn-modal-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-d" id="btn-modal-reject" onclick="doProcess('반려')">반려</button>
      <button class="btn btn-s" id="btn-modal-approve" onclick="doProcess('승인')">승인</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbyRdAFyS4zhClmX6dLiAAQ9HTrq1PmYPm2nFxfYYAMM7_r-nUFhXOO7tRXUT6U6c2GgOg/exec';
const COLORS=['#2563eb','#16a34a','#7c3aed','#ea580c','#dc2626','#0891b2','#d97706','#be185d'];
const LIGHT={'#2563eb':'#eff4ff','#16a34a':'#f0fdf4','#7c3aed':'#f5f3ff','#ea580c':'#fff7ed','#dc2626':'#fef2f2','#0891b2':'#ecfeff','#d97706':'#fffbeb','#be185d':'#fdf2f8'};

let lang=localStorage.getItem('jnfam_lang')||'ko';
let me=null,isAdmin=false,employees=[],leaves=[],settings={};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),activeTab=0,ec={};
let federalHolidays={};

// ── 다국어 ────────────────────────────────────
const T={
  ko:{
    login:'🔐 로그인', logout:'로그아웃',
    loginTitle:'로그인', loginSub:'이름을 선택하면 바로 입장해요',
    adminLogin:'관리자 로그인', adminEnter:'입장',
    adminPwPlaceholder:'관리자 비밀번호',
    legendHoliday:'🇺🇸 미국 연방 공휴일', legendToday:'오늘',
    loading:'데이터 불러오는 중...',
    todayOn:'오늘 휴가 중: ', todayPeople:'명이 휴가 중입니다',
    remainDays:'잔여', days:'일',
    tabPending:'📋 승인 대기', tabAll:'📅 전체 내역', tabEmps:'👥 직원 현황',
    tabApply:'✉️ 휴가 신청', tabMine:'📋 내 내역',
    applyTitle:'✉️ 휴가 신청', applyNote:'🇺🇸 미국 연방 공휴일·주말 자동 제외',
    leaveType:'휴가 종류', startDate:'시작일', endDate:'종료일',
    calcDays:'계산된 영업일', reason:'사유', reasonPh:'사유 입력 (선택)',
    applyBtn:'신청하기',
    types:['연차','반차(오전)','반차(오후)','병가','기타'],
    typeVals:['annual','half-am','half-pm','sick','other'],
    daysResult:(d,h)=>'📅 총 '+d+'일 (영업일 기준)'+(h>0?' · 연방 공휴일 '+h+'일 제외':''),
    selectDate:'날짜를 선택하면 자동 계산됩니다',
    selectEnd:'종료일을 선택해주세요',
    errEndDate:'❌ 종료일이 시작일보다 빠릅니다',
    errNoWorkday:'❌ 선택한 기간에 영업일이 없어요',
    errStart:'❌ 시작일을 입력해주세요',
    halfDay:'0.5일 (반차)',
    myLeaves:'📋 내 신청 내역', noLeaves:'신청 내역이 없어요',
    pendingTitle:'📋 승인 대기', noPending:'대기 중인 신청이 없어요',
    allTitle:'📅 전체 내역', noAll:'신청 내역이 없어요',
    empTitle:'👥 직원 연차 현황',
    colName:'직원명', colTotal:'총 연차', colUsed:'사용', colRemain:'잔여', colRate:'사용률',
    statTotal:'총 연차', statUsed:'사용', statRemain:'잔여', statPending:'대기중',
    applySuccess:'✅ 휴가 신청이 완료됐어요!', applyFail:'❌ 신청 실패',
    processTitle:'휴가 처리', memoLabel:'처리 메모 (선택)', memoPh:'반려 사유 등',
    cancel:'취소', reject:'반려', approve:'승인',
    approved:'✅ 승인됐어요', rejected:'❌ 반려됐어요', processFail:'❌ 처리 실패',
    cancelConfirm:'이 신청을 취소할까요?', cancelOk:'✅ 취소됐어요',
    pwWrong:'❌ 비밀번호가 틀렸습니다', errData:'데이터를 불러오지 못했어요. 새로고침 해주세요.',

// ── 연방 공휴일 계산 ──────────────────────────
function getNthWeekday(year,month,weekday,n){
  var d=new Date(year,month,1),count=0;
  while(d.getMonth()===month){if(d.getDay()===weekday){count++;if(count===n)return new Date(d);}d.setDate(d.getDate()+1);}
  return null;
}
function getLastWeekday(year,month,weekday){
  var d=new Date(year,month+1,0);
  while(d.getDay()!==weekday)d.setDate(d.getDate()-1);
  return new Date(d);
}
function observedDate(date){
  var d=new Date(date);
  if(d.getDay()===6)d.setDate(d.getDate()-1);
  if(d.getDay()===0)d.setDate(d.getDate()+1);
  return d;
}
function toYMDDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function calcFederalHolidays(year){
  var h={};
  function add(date,name){var obs=observedDate(date);h[toYMDDate(obs)]='🇺🇸 '+name;}
  add(new Date(year,0,1),"New Year's Day");
  add(getNthWeekday(year,0,1,3),'MLK Day');
  add(getNthWeekday(year,1,1,3),"Presidents' Day");
  add(getLastWeekday(year,4,1),'Memorial Day');
  add(new Date(year,5,19),'Juneteenth');
  add(new Date(year,6,4),'Independence Day');
  add(getNthWeekday(year,8,1,1),'Labor Day');
  add(getNthWeekday(year,9,1,2),'Columbus Day');
  add(new Date(year,10,11),'Veterans Day');
  add(getNthWeekday(year,10,4,4),'Thanksgiving Day');
  add(new Date(year,11,25),'Christmas Day');
  return h;
}

function loadFederalHolidays(){
  var y=new Date().getFullYear();
  Object.assign(federalHolidays,calcFederalHolidays(y-1));
  Object.assign(federalHolidays,calcFederalHolidays(y));
  Object.assign(federalHolidays,calcFederalHolidays(y+1));
}

// ── 날짜 유틸 ─────────────────────────────────
function fmtDisplay(str){
  if(!str)return'';
  var m=String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m?m[1]+'.'+m[2]+'.'+m[3]:str;
}
function toYMD(str){return str?String(str).substring(0,10):'';}
function todayYMD(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isWeekend(ds){var p=ds.split('-');return new Date(+p[0],+p[1]-1,+p[2]).getDay()%6===0;}
function isFedHoliday(ds){return !!federalHolidays[ds];}

function calcBizDays(s,e,type){
  if(type&&(type.includes('반차')||type.includes('Half')))return 0.5;
  var sp=s.split('-'),ep=e.split('-');
  var start=new Date(+sp[0],+sp[1]-1,+sp[2]),end=new Date(+ep[0],+ep[1]-1,+ep[2]);
  var cnt=0,cur=new Date(start);
  while(cur<=end){
    var ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    if(!isWeekend(ds)&&!isFedHoliday(ds))cnt++;
    cur.setDate(cur.getDate()+1);
  }
  return cnt;
}

function statusLabel(s){ return t('statusMap')[s]||s; }

// ── API ───────────────────────────────────────
async function apiGet(action){const r=await fetch(API+'?action='+action+'&t='+Date.now());return r.json();}
async function apiPost(body){
  // [버그수정] Google Apps Script는 CORS preflight 처리 중 POST가 2번 실행됨
  // XMLHttpRequest는 이 리디렉션을 따라가지 않아 중복 없이 1번만 전송됨
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',API,true);
    xhr.setRequestHeader('Content-Type','text/plain');
    xhr.onload=()=>{
      try{resolve(JSON.parse(xhr.responseText));}
      catch(e){resolve({success:true});}
    };
    xhr.onerror=()=>reject(new Error('Network error'));
    xhr.send(JSON.stringify(body));
  });
}

// ── 캘린더 ────────────────────────────────────
function chMonth(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  const titleEl=document.getElementById('cal-title');
  const grid=document.getElementById('cgrid');
  if(!titleEl||!grid)return;
  titleEl.textContent=t('calTitle',calY,calM);
  const todayStr=todayYMD();
  let html=t('calDays').map(d=>`<div class="cdh">${d}</div>`).join('');
  const firstDay=new Date(calY,calM,1);
  const lastDay=new Date(calY,calM+1,0);
  const cur=new Date(firstDay);
  while(cur.getDay()!==1)cur.setDate(cur.getDate()-1);
  const endBound=new Date(lastDay);
  while(endBound.getDay()!==5)endBound.setDate(endBound.getDate()+1);
  while(cur<=endBound){
    const dow=cur.getDay();
    if(dow===0||dow===6){cur.setDate(cur.getDate()+1);continue;}
    const y=cur.getFullYear(),m=String(cur.getMonth()+1).padStart(2,'0'),d=String(cur.getDate()).padStart(2,'0');
    const ds=`${y}-${m}-${d}`;
    const isThisMonth=cur.getMonth()===calM;
    const isToday=ds===todayStr;
    const holiday=federalHolidays[ds];
    const dayLeaves=leaves.filter(l=>l.status==='승인'&&toYMD(l.startDate)<=ds&&ds<=toYMD(l.endDate));
    const tags=dayLeaves.slice(0,5).map(l=>{
      const color=ec[l.name]||'#2563eb';
      return `<div class="ctag" style="background:${LIGHT[color]||'#eff4ff'};color:${color}">${l.name}${l.type&&(l.type.includes('반차')||l.type.includes('Half'))?' (½)':''}</div>`;
    }).join('');
    html+=`<div class="cd${!isThisMonth?' om':''}${isToday?' today':''}${holiday?' holiday':''}">${holiday?`<div class="hname">${holiday}</div>`:''}<div class="dn">${cur.getDate()}</div>${tags}</div>`;
    cur.setDate(cur.getDate()+1);
  }
  grid.innerHTML=html;
}

function isHalfType(type){return type&&(type.includes('반차')||type.includes('Half'));}

function updatePreview(){
  const type=document.getElementById('f-type')?.value||'';
  const start=document.getElementById('f-start')?.value;
  const half=isHalfType(type);
  const ew=document.getElementById('end-wrap');
  if(ew)ew.style.display=half?'none':'';
  const end=half?start:document.getElementById('f-end')?.value;
  const p=document.getElementById('days-preview');
  if(!p)return;
  if(!start){p.textContent=t('selectDate');return;}
  if(half){p.textContent=t('halfDay');return;}
  if(!end){p.textContent=t('selectEnd');return;}
  if(end<start){p.textContent=t('errEndDate');return;}
  const days=calcBizDays(start,end,type);
  const h=Object.keys(federalHolidays).filter(d=>d>=start&&d<=end).length;
  p.textContent=t('daysResult',days,h);
}

async function submitLeave(){
  const type=document.getElementById('f-type').value;
  const start=document.getElementById('f-start').value;
  const half=isHalfType(type);
  const end=half?start:(document.getElementById('f-end')?.value||start);
  const reason=document.getElementById('f-reason').value;
  if(!start){toast(t('errStart'));return;}
  if(!half&&end<start){toast(t('errEndDate'));return;}
  const days=calcBizDays(start,end,type);
  if(days===0){toast(t('errNoWorkday'));return;}
  try{
    const res=await apiPost({action:'applyLeave',name:me,type,startDate:start,endDate:end,days,reason});
    if(res.success){toast(t('applySuccess'));leaves=await apiGet('getLeaves');renderTodayBanner();renderCal();setTab(1);}
    else toast(t('applyFail'));
  }catch(e){toast(t('applyFail'));}
}

    <div class="card-hd"><h3>${t('empTitle')}</h3></div>
    <div class="card-bd" style="padding:0"><table class="etable">
      <thead><tr><th>${t('colName')}</th><th>${t('colTotal')}</th><th>${t('colUsed')}</th><th>${t('colRemain')}</th><th>${t('colRate')}</th></tr></thead>
      <tbody>${emps.map(e=>{
        const total=Number(e.totalDays)||0,used=Number(e.usedDays)||0,remain=Number(e.remainDays)||0;
        const pct=total?Math.min(100,Math.round(used/total*100)):0;
        const color=pct>80?'var(--red)':pct>50?'var(--orange)':'var(--accent)';
        return`<tr><td style="font-weight:700">${e.name}</td><td>${total}${t('days')}</td><td style="color:var(--red)">${used}${t('days')}</td><td style="color:var(--green);font-weight:700">${remain}${t('days')}</td>
          <td style="min-width:100px"><div style="font-size:11px;color:var(--text3);margin-bottom:2px">${pct}%</div><div class="pbar"><div class="pfill" style="width:${pct}%;background:${color}"></div></div></td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

function openModal(id,name,type,days){
  document.getElementById('modal-id').value=id;
  document.getElementById('modal-note').value='';
  document.getElementById('modal-info').innerHTML=`👤 <strong>${name}</strong> · ${type} · <strong>${days}${t('days')}</strong>`;
  document.getElementById('modal-wrap').classList.add('open');
}
function closeModal(){document.getElementById('modal-wrap').classList.remove('open');}

async function doProcess(status){
  const id=document.getElementById('modal-id').value;
  const note=document.getElementById('modal-note').value;
  try{
    const res=await apiPost({action:'processLeave',id,status,processor:me,note});
    if(res.success){
      toast(status==='승인'?t('approved'):t('rejected'));
      closeModal();
      const results=await Promise.all([apiGet('getLeaves'),apiGet('getEmployees')]);
      leaves=results[0];employees=results[1];
      employees.filter(e=>e.isAdmin!=='Y').forEach((e,i)=>{ec[e.name]=COLORS[i%COLORS.length];});
      renderEmpStatusBar();renderTodayBanner();renderCal();
      if(me)renderMyContent();
    }
  }catch(e){toast(t('processFail'));}
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

document.getElementById('login-modal').addEventListener('click',e=>{if(e.target===document.getElementById('login-modal'))closeLoginModal();});
document.getElementById('modal-wrap').addEventListener('click',e=>{if(e.target===document.getElementById('modal-wrap'))closeModal();});

init();
</script>
</body>
</html>
